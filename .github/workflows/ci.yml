name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dependent packages
        run: |
          pnpm --filter @agentoolbox/validator build
          pnpm --filter @agentoolbox/firewall build
          pnpm --filter @agentoolbox/payments build
          pnpm --filter @agentoolbox/core build
          pnpm --filter @agentoolbox/privacy build
          pnpm --filter @agentoolbox/compliance build
          pnpm --filter @agentoolbox/health build
          pnpm --filter @agentoolbox/agent build
          pnpm --filter @agentoolbox/infra build
          pnpm --filter @agentoolbox/legal build
          pnpm --filter @agentoolbox/identity build
          pnpm --filter @agentoolbox/schema build
          pnpm --filter @agentoolbox/sqlguard build
          pnpm --filter @agentoolbox/cmdguard build
          pnpm --filter @agentoolbox/netguard build
          pnpm --filter @agentoolbox/finance build
          pnpm --filter @agentoolbox/contracts build

      - name: Run tests
        run: pnpm test

      - name: Typecheck all packages
        run: |
          pnpm --filter @agentoolbox/validator typecheck
          pnpm --filter @agentoolbox/firewall typecheck
          pnpm --filter @agentoolbox/core typecheck
          pnpm --filter @agentoolbox/privacy typecheck
          pnpm --filter @agentoolbox/compliance typecheck
          pnpm --filter @agentoolbox/health typecheck
          pnpm --filter @agentoolbox/agent typecheck
          pnpm --filter @agentoolbox/infra typecheck
          pnpm --filter @agentoolbox/legal typecheck
          pnpm --filter @agentoolbox/identity typecheck
          pnpm --filter @agentoolbox/schema typecheck
          pnpm --filter @agentoolbox/sqlguard typecheck
          pnpm --filter @agentoolbox/cmdguard typecheck
          pnpm --filter @agentoolbox/netguard typecheck
          pnpm --filter @agentoolbox/finance typecheck
          pnpm --filter @agentoolbox/contracts typecheck
          pnpm --filter agent-toolbox-sdk typecheck
          pnpm --filter @agentoolbox/api typecheck
          pnpm --filter agentoolbox-mcp typecheck
