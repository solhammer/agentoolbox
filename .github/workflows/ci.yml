name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dependent packages
        run: |
          pnpm --filter @agentoolbox/validator build
          pnpm --filter @agentoolbox/firewall build
          pnpm --filter @agentoolbox/payments build

      - name: Run tests
        run: pnpm test

      - name: Typecheck all packages
        run: |
          pnpm --filter @agentoolbox/validator typecheck
          pnpm --filter @agentoolbox/firewall typecheck
          pnpm --filter @agentoolbox/sdk typecheck
          pnpm --filter @agentoolbox/api typecheck
          pnpm --filter @agentoolbox/mcp typecheck
