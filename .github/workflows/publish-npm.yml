name: Publish to npm

# Triggered manually or on a version tag push (e.g. sdk-v1.0.1)
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.1)'
        required: true
      otp:
        description: '6-digit OTP from your authenticator app (only needed until Trusted Publishing is configured)'
        required: false
  push:
    tags:
      - 'sdk-v*'
      - 'mcp-v*'

jobs:
  publish:
    name: Publish agent-toolbox-sdk
    # SDK: manual dispatch or an sdk-v* tag (preserves existing behavior).
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/sdk-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'           # Trusted publishing requires Node 22.14+
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build SDK
        run: pnpm --filter agent-toolbox-sdk build

      - name: Publish to npm
        run: npm publish --access public
        working-directory: packages/sdk
        env:
          # Uses bypass-2FA granular access token when set.
          # Once Trusted Publishing is configured on npmjs.com, this can be removed.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-mcp:
    name: Publish agentoolbox-mcp
    # MCP: on mcp-v* tags. The server bundles the workspace libs via tsup,
    # so those libs must be built before the bundle.
    if: startsWith(github.ref, 'refs/tags/mcp-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for MCP Registry GitHub OIDC login

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace libraries (bundled into the MCP server)
        run: |
          pnpm --filter @agentoolbox/validator build
          pnpm --filter @agentoolbox/firewall build
          pnpm --filter @agentoolbox/payments build
          pnpm --filter @agentoolbox/core build
          pnpm --filter @agentoolbox/privacy build
          pnpm --filter @agentoolbox/finance build

      - name: Build MCP bundle
        run: pnpm --filter agentoolbox-mcp build

      - name: Publish to npm
        run: pnpm publish --no-git-checks --access public
        working-directory: packages/mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to the MCP Registry (best-effort)
        continue-on-error: true
        run: |
          ARCH=$(uname -m); case "$ARCH" in x86_64) ARCH=amd64;; aarch64|arm64) ARCH=arm64;; esac
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          curl -sL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_${OS}_${ARCH}.tar.gz" | tar xz mcp-publisher
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
